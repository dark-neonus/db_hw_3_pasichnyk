<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Workload</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h2>Modify Workload</h2>
        
        <form class="main-form" action="/assistantships/update" method="post">
            <div class="form-group">
                <label>Assistantship ID:</label>
                <select name="id" required>
                    <option value="" disabled selected>Select assistantship</option>
                    <option th:each="a : ${assistantships}"
                            th:value="${a.assistantship_id}"
                            th:text="${a.assistantship_id + ' (current: ' + a.hours_per_week + 'h)'}">
                    </option>
                </select>
            </div>
            <div class="form-group">
                <label>New Hours Per Week:</label>
                <input type="number" name="newHours" min="1" max="40" required>
            </div>
            <div class="form-group">
                <label>Staff Approving:</label>
                <input type="text" name="user" required>
            </div>
            <div class="form-group">
                <label>Reason for Change:</label>
                <input type="text" name="reason" required>
            </div>
            <input type="submit" value="Update Workload">
        </form>
        
        <a class="btn-back" href="/">Back to Menu</a>
    </div>
</body>
</html>
