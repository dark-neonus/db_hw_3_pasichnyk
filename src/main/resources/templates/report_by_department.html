<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report: Assistantships by Department</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h2>Report: Assistantships by Department</h2>
        <button class="no-print btn-print" onclick="window.print()">Generate Report</button>
        
        <table>
            <thead>
                <tr>
                    <th>Department Name</th>
                    <th>Assistantship Type</th>
                    <th>Count</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="r : ${report}">
                    <td th:text="${r.department_name}"></td>
                    <td th:text="${r.assistantship_type}"></td>
                    <td th:text="${r.count}"></td>
                </tr>
            </tbody>
        </table>
        
        <a class="btn-back no-print" href="/">Back to Menu</a>
    </div>
</body>
</html>
