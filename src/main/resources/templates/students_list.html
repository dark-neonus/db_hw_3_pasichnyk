<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students List</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h2>Students List</h2>
        <button class="no-print btn-print" onclick="window.print()">Generate Report</button>
        
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th class="no-print">Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="s : ${students}">
                    <td th:text="${s.student_id}"></td>
                    <td th:text="${s.first_name}"></td>
                    <td th:text="${s.last_name}"></td>
                    <td th:text="${s.email}"></td>
                    <td class="no-print">
                        <form class="delete-form" action="/students/delete" method="post">
                            <input type="hidden" name="id" th:value="${s.student_id}">
                            <input type="submit" value="Delete">
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <a class="btn-back no-print" href="/">Back to Menu</a>
    </div>
</body>
</html>
